services:
  # ── Application Services ──────────────────────────────────────────────────

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: helpforge-api-gateway
    ports:
      - "5000:5000"
    env_file:
      - ../services/api-gateway/.env
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: helpforge-worker
    command: node src/worker.js
    env_file:
      - ../services/api-gateway/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  chatbot-service:
    build:
      context: ../services/chatbot-service
      dockerfile: Dockerfile
    container_name: helpforge-chatbot
    ports:
      - "8000:8000"
    env_file:
      - ../services/chatbot-service/.env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: helpforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ── Monitoring Stack ──────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: helpforge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - api-gateway
      - chatbot-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: helpforge-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
