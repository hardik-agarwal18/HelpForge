name: Test-Api-Gateway-Unit

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api-gateway-unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/api-gateway

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/helpforge_test?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: |
          $duration = (Measure-Command { npm run test:coverage }).TotalSeconds
          "UNIT_TEST_SECONDS=$([math]::Round($duration, 2))" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-unit-coverage
          path: services/api-gateway/coverage

      - name: Publish unit test summary
        run: |
          @"
          ## API Gateway Unit Tests

          - Coverage: generated in \`services/api-gateway/coverage\`
          - Duration: ${{ env.UNIT_TEST_SECONDS }} seconds
          "@ >> $env:GITHUB_STEP_SUMMARY
        shell: pwsh
