name: Test-Api-Gateway-Integration

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api-gateway-integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: helpforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d helpforge_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: services/api-gateway

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/helpforge_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/helpforge_test?schema=public
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create CI env file
        run: |
          @"
          DATABASE_URL=${{ env.DATABASE_URL }}
          DATABASE_URL_TEST=${{ env.DATABASE_URL_TEST }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          NODE_ENV=${{ env.NODE_ENV }}
          "@ | Set-Content -Path .env
        shell: pwsh

      - name: Run integration tests
        run: npm run test:integration
