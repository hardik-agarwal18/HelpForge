<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpForge Widget — Embed Example</title>
</head>
<body>
  <h1>Product Page</h1>
  <p>This page demonstrates the HelpForge chat widget embed.</p>

  <!--
    Standalone embed — no React required on the host page.
    Load the UMD bundle then call HelpForgeWidget.mount() with your config.

    Build the bundle first:
      cd frontend/widget && npm install && npm run build

    Then serve dist/widget.umd.js from a CDN or your static assets server.
  -->
  <script src="dist/widget.umd.js"></script>
  <script>
    HelpForgeWidget.mount({
      orgId:        "org_demo",
      apiUrl:       "http://localhost:8000",   // chatbot-service URL
      botName:      "HelpBot",
      primaryColor: "#2563eb",
      streaming:    true,
      context: {
        page:       "product",
        product_id: "pro-annual",
        metadata: {
          locale: "en-US",
        },
      },
    });
  </script>
</body>
</html>
